name: Publish Docker dev images

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: Source repository to build.
        required: true
        default: jaysqvl/Scriberr
      upstream_ref:
        description: Upstream branch, tag, or SHA to build.
        required: true
        default: main
      image_channel:
        description: Docker tag channel to publish.
        required: true
        default: manual
      variants:
        description: Image variant to build.
        required: true
        default: all
        type: choice
        options:
          - all
          - cpu
          - cuda
          - blackwell
      publish_latest:
        description: Also publish latest tags for the selected variants.
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"
      - "docker-build-*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-dev-images-${{ github.event.inputs.upstream_ref || vars.SCRIBERR_UPSTREAM_REF || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  publish:
    name: Publish ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            tag_suffix: ""
          - variant: cuda
            dockerfile: Dockerfile.cuda
            tag_suffix: "-cuda"
          - variant: blackwell
            dockerfile: Dockerfile.cuda.12.9
            tag_suffix: "-blackwell"

    steps:
      - name: Resolve build settings
        id: settings
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository }}
          INPUT_UPSTREAM_REF: ${{ github.event.inputs.upstream_ref }}
          INPUT_IMAGE_CHANNEL: ${{ github.event.inputs.image_channel }}
          INPUT_VARIANTS: ${{ github.event.inputs.variants }}
          INPUT_PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
          VAR_SOURCE_REPOSITORY: ${{ vars.SCRIBERR_SOURCE_REPOSITORY }}
          VAR_UPSTREAM_REF: ${{ vars.SCRIBERR_UPSTREAM_REF }}
          VAR_IMAGE_CHANNEL: ${{ vars.SCRIBERR_IMAGE_CHANNEL }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          source_repository="${INPUT_SOURCE_REPOSITORY:-${VAR_SOURCE_REPOSITORY:-$GITHUB_REPOSITORY_NAME}}"
          source_ref="${INPUT_UPSTREAM_REF:-${VAR_UPSTREAM_REF:-main}}"
          image_channel="${INPUT_IMAGE_CHANNEL:-${VAR_IMAGE_CHANNEL:-manual}}"
          variants="${INPUT_VARIANTS:-all}"
          publish_latest="${INPUT_PUBLISH_LATEST:-false}"
          build_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" == docker-build-* ]]; then
            image_channel="${REF_NAME#docker-build-}"
            source_repository="$GITHUB_REPOSITORY_NAME"
            source_ref="$image_channel"
            variants="all"
            publish_latest="true"
          elif [[ "$EVENT_NAME" == "push" && "$REF_NAME" == v*.*.* ]]; then
            image_channel="${REF_NAME#v}"
            source_repository="$GITHUB_REPOSITORY_NAME"
            source_ref="$REF_NAME"
            variants="all"
            publish_latest="true"
          fi

          {
            echo "source_repository=$source_repository"
            echo "source_ref=$source_ref"
            echo "image_channel=$image_channel"
            echo "variants=$variants"
            echo "publish_latest=$publish_latest"
            echo "build_date=$build_date"
          } >> "$GITHUB_OUTPUT"

      - name: Check selected variant
        id: variant
        shell: bash
        run: |
          if [[ "${{ steps.settings.outputs.variants }}" != "all" && "${{ steps.settings.outputs.variants }}" != "${{ matrix.variant }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout upstream source
        if: steps.variant.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.settings.outputs.source_repository }}
          ref: ${{ steps.settings.outputs.source_ref }}
          fetch-depth: 1

      - name: Check variant Dockerfile
        if: steps.variant.outputs.enabled == 'true'
        id: dockerfile
        shell: bash
        run: |
          if [[ -f "${{ matrix.dockerfile }}" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping ${{ matrix.variant }} because ${{ matrix.dockerfile }} does not exist in ${{ steps.settings.outputs.source_repository }}@${{ steps.settings.outputs.source_ref }}"
            echo "Skipping ${{ matrix.variant }}: ${{ matrix.dockerfile }} does not exist in ${{ steps.settings.outputs.source_repository }}@${{ steps.settings.outputs.source_ref }}." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Capture source metadata
        if: steps.variant.outputs.enabled == 'true' && steps.dockerfile.outputs.exists == 'true'
        id: source
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.variant.outputs.enabled == 'true' && steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.variant.outputs.enabled == 'true' && steps.dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        if: steps.variant.outputs.enabled == 'true' && steps.dockerfile.outputs.exists == 'true'
        id: tags
        shell: bash
        env:
          SHORT_SHA: ${{ steps.source.outputs.short_sha }}
          IMAGE_CHANNEL: ${{ steps.settings.outputs.image_channel }}
          PUBLISH_LATEST: ${{ steps.settings.outputs.publish_latest }}
        run: |
          channel="$(printf '%s' "$IMAGE_CHANNEL" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
          if [[ -z "$channel" ]]; then
            channel="nightly"
          fi

          namespace="$(printf '%s' "$IMAGE_NAMESPACE" | tr '[:upper:]' '[:lower:]')"
          repo="${REGISTRY}/${namespace}/scriberr"
          suffix="${{ matrix.tag_suffix }}"
          tags="${repo}:${channel}${suffix}"
          tags="${tags}"$'\n'"${repo}:${channel}${suffix}-${SHORT_SHA}"

          if [[ "$PUBLISH_LATEST" == "true" ]]; then
            if [[ -z "$suffix" ]]; then
              tags="${tags}"$'\n'"${repo}:latest"
            else
              tags="${tags}"$'\n'"${repo}:latest${suffix}"
            fi
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.variant.outputs.enabled == 'true' && steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ steps.settings.outputs.image_channel }}
            COMMIT=${{ steps.source.outputs.sha }}
            DATE=${{ steps.settings.outputs.build_date }}
          labels: |
            org.opencontainers.image.title=Scriberr
            org.opencontainers.image.source=https://github.com/${{ steps.settings.outputs.source_repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.ref.name=${{ steps.settings.outputs.source_ref }}
