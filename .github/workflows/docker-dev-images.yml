name: Publish Docker dev images

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream branch, tag, or SHA to build.
        required: true
        default: nightly
      image_channel:
        description: Docker tag channel to publish.
        required: true
        default: nightly
      variants:
        description: Image variant to build.
        required: true
        default: all
        type: choice
        options:
          - all
          - cpu
          - cuda
          - blackwell
      publish_latest:
        description: Also publish latest tags for the selected variants.
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

concurrency:
  group: docker-dev-images-${{ github.event.inputs.upstream_ref || vars.SCRIBERR_UPSTREAM_REF || 'nightly' }}
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: rishikanthc/Scriberr
  UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || vars.SCRIBERR_UPSTREAM_REF || 'nightly' }}
  IMAGE_CHANNEL: ${{ github.event.inputs.image_channel || vars.SCRIBERR_IMAGE_CHANNEL || 'nightly' }}
  IMAGE_NAMESPACE: jaysqvl
  REQUESTED_VARIANTS: ${{ github.event.inputs.variants || 'all' }}
  PUBLISH_LATEST: ${{ github.event.inputs.publish_latest || 'false' }}

jobs:
  publish:
    name: Publish ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            tag_suffix: ""
          - variant: cuda
            dockerfile: Dockerfile.cuda
            tag_suffix: "-cuda"
          - variant: blackwell
            dockerfile: Dockerfile.cuda.12.9
            tag_suffix: "-blackwell"

    steps:
      - name: Check selected variant
        id: variant
        shell: bash
        run: |
          if [[ "$REQUESTED_VARIANTS" != "all" && "$REQUESTED_VARIANTS" != "${{ matrix.variant }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout upstream source
        if: steps.variant.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ env.UPSTREAM_REF }}
          fetch-depth: 1

      - name: Capture source metadata
        if: steps.variant.outputs.enabled == 'true'
        id: source
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub secrets
        if: steps.variant.outputs.enabled == 'true'
        shell: bash
        env:
          DH_USERNAME: ${{ secrets.DH_USERNAME }}
          DH_PAT: ${{ secrets.DH_PAT }}
        run: |
          if [[ -z "$DH_USERNAME" || -z "$DH_PAT" ]]; then
            echo "Missing DH_USERNAME or DH_PAT repository secret." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        if: steps.variant.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.variant.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DH_USERNAME }}
          password: ${{ secrets.DH_PAT }}

      - name: Prepare image tags
        if: steps.variant.outputs.enabled == 'true'
        id: tags
        shell: bash
        env:
          SHORT_SHA: ${{ steps.source.outputs.short_sha }}
        run: |
          channel="$(printf '%s' "$IMAGE_CHANNEL" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
          if [[ -z "$channel" ]]; then
            channel="nightly"
          fi

          repo="${IMAGE_NAMESPACE}/scriberr"
          suffix="${{ matrix.tag_suffix }}"
          tags="${repo}:${channel}${suffix}"
          tags="${tags}"$'\n'"${repo}:${channel}${suffix}-${SHORT_SHA}"

          if [[ "$PUBLISH_LATEST" == "true" ]]; then
            if [[ -z "$suffix" ]]; then
              tags="${tags}"$'\n'"${repo}:latest"
            else
              tags="${tags}"$'\n'"${repo}:latest${suffix}"
            fi
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$tags" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.variant.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Scriberr
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPOSITORY }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.ref.name=${{ env.UPSTREAM_REF }}
